services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: plutus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plutus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plutus_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-plutus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plutus}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - plutus-network

  # ==========================================================================
  # Redis (Celery broker + cache)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: plutus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - plutus-network

  # ==========================================================================
  # Backend API (FastAPI)
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: plutus-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-plutus}:${POSTGRES_PASSWORD:-plutus_dev_password}@postgres:5432/${POSTGRES_DB:-plutus}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - AI_ENABLED=${AI_ENABLED:-true}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma:7b}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-sonnet-20240229}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
      - reports_data:/tmp/reports
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - plutus-network

  # ==========================================================================
  # Celery Worker
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: plutus-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-plutus}:${POSTGRES_PASSWORD:-plutus_dev_password}@postgres:5432/${POSTGRES_DB:-plutus}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma:7b}
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
      - reports_data:/tmp/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info
    networks:
      - plutus-network

  # ==========================================================================
  # Celery Beat (Scheduler)
  # ==========================================================================
  beat:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: plutus-beat
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - worker
    command: celery -A app.workers.celery_app beat --loglevel=info
    networks:
      - plutus-network

  # ==========================================================================
  # Frontend (React + Vite)
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: plutus-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    networks:
      - plutus-network

  # ==========================================================================
  # Nginx (Production reverse proxy)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: plutus-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - production
    networks:
      - plutus-network

volumes:
  postgres_data:
  redis_data:
  upload_data:
  reports_data:

networks:
  plutus-network:
    driver: bridge
